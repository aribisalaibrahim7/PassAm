<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#09090b" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4"/>
  <!-- Glowing Path / Logo 'P' -->
  <g filter="url(#neonGlow)">
    <path d="M180 140 H280 C340 140 370 170 370 220 C370 270 340 300 280 300 H220 V380 H180 Z M220 180 V260 H280 C310 260 330 250 330 220 C330 190 310 180 280 180 Z" fill="url(#glowGrad)" />
    <!-- Floating Sparkle -->
    <circle cx="340" cy="160" r="12" fill="#22d3ee" />
  </g>
</svg>
